<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="A premium, modern Pomodoro Clock with glassmorphic design, dynamic circular progress indicator, and custom audio chime notifications.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
    <title>Pomodoro Clock</title>
</head>
<body class="session-mode">
    <div id="stars-container"></div>
    <main id="container">
        <header>
            <h1 id="title">Pomodoro Clock</h1>
        </header>

        <section id="clock">
            <div id="controls">
                <div id="session" class="control-box">
                    <h4>Session Length</h4>
                    <div class="control-actions">
                        <button id="sessionDown" type="button" class="btn-ctrl" aria-label="Decrease session time by 1 minute"><span aria-hidden="true">&minus;</span></button>
                        <span id="sessionTime" aria-live="polite">25</span>
                        <button id="sessionUp" type="button" class="btn-ctrl" aria-label="Increase session time by 1 minute"><span aria-hidden="true">&plus;</span></button>
                    </div>
                </div>
                
                <div id="break" class="control-box">
                    <h4>Break Length</h4>
                    <div class="control-actions">
                        <button id="breakDown" type="button" class="btn-ctrl" aria-label="Decrease break time by 1 minute"><span aria-hidden="true">&minus;</span></button>
                        <span id="breakTime" aria-live="polite">5</span>
                        <button id="breakUp" type="button" class="btn-ctrl" aria-label="Increase break time by 1 minute"><span aria-hidden="true">&plus;</span></button>
                    </div>
                </div>
            </div>

            <div id="display-container">
                <svg class="progress-ring" width="280" height="280" viewBox="0 0 280 280">
                    <circle class="progress-ring__background" stroke-width="6" fill="transparent" r="130" cx="140" cy="140"/>
                    <circle class="progress-ring__circle" stroke-width="6" fill="transparent" r="130" cx="140" cy="140" stroke-linecap="round"/>
                </svg>
                <div id="display" role="timer" aria-live="off">
                    <div id="clockState">Session</div>
                    <div id="time-text">
                        <span id="minutes">25</span>:<span id="seconds">00</span>
                    </div>
                </div>
            </div>

            <div id="action-buttons">
                <button id="start" type="button" class="btn btn-primary">Start</button>
                <button id="reset" type="button" class="btn btn-secondary">Reset</button>
            </div>
        </section>

        <div id="message" role="status" aria-live="polite"></div>
    </main>

    <footer id="footer">
        <p>&copy; 2019 - 2026 Michael Hamilton</p>
    </footer>
    <script src="./index.js"></script>
</body>
</html>
